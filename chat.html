<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Chats - Círculo de Cuidado</title>
<link href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css" rel="stylesheet">
<style>
  body { background-color: #f4f6f9; font-family: 'Nunito', sans-serif; }
  .search-bar { background: white; border-radius: 12px; padding: 10px 15px; border: 2px solid #e2e8f0; }
  .search-bar input { border: none; outline: none; background: transparent; width: 100%; margin-left: 10px; }
  .chat-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: 0.2s; }
  .chat-card:hover { transform: translateY(-2px); border-color: #2EA7C9; border-style: solid; border-width: 2px; }
  .star-btn { font-size: 24px; cursor: pointer; color: #94a3b8; transition: 0.2s; border: none; background: transparent; }
  .star-btn.active { color: #f59e0b; }
</style>
</head>
<body>

<div class="container py-4 col-md-6 mx-auto">
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <a href="./index.html" class="btn btn-outline-secondary btn-sm fw-bold" style="border-radius: 10px;">← Início</a>
            <h4 class="fw-bold mb-0 text-dark">Conversas 💬</h4>
        </div>
    </div>

    <div class="d-flex gap-2 mb-4">
        <div class="d-flex align-items-center search-bar flex-grow-1 shadow-sm">
            <span>🔍</span>
            <input type="text" id="inputBusca" placeholder="Procurar conversa..." onkeyup="renderizarChats()">
        </div>
        <button id="btnFiltroFav" class="btn btn-light shadow-sm fw-bold border" onclick="toggleFiltroFav()">
            ⭐ Favoritos
        </button>
    </div>

    <div id="listaChats"></div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem("usuario"));
  if (!user) window.location.href = "login.html";

  let todosChats = [];
  let mostrarApenasFavoritos = false;

  async function carregarChats() {
    try {
      const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/chats/${user.id}`);
      todosChats = await res.json();
      renderizarChats();
    } catch (err) { console.error(err); }
  }

  function toggleFiltroFav() {
      mostrarApenasFavoritos = !mostrarApenasFavoritos;
      const btn = document.getElementById("btnFiltroFav");
      btn.style.background = mostrarApenasFavoritos ? "#fef3c7" : "white";
      btn.style.borderColor = mostrarApenasFavoritos ? "#f59e0b" : "#dee2e6";
      renderizarChats();
  }

function renderizarChats() {
      const termoBusca = document.getElementById("inputBusca").value.toLowerCase();
      const container = document.getElementById("listaChats");
      container.innerHTML = "";

      let chatsFiltrados = todosChats.filter(c => c.nome.toLowerCase().includes(termoBusca));
      if (mostrarApenasFavoritos) chatsFiltrados = chatsFiltrados.filter(c => c.is_favorito);

      if (chatsFiltrados.length === 0) {
          container.innerHTML = "<p class='text-center text-muted mt-4'>Nenhuma conversa encontrada.</p>";
          return;
      }

      chatsFiltrados.forEach(chat => {
          const fotoSrc = chat.foto || `https://ui-avatars.com/api/?name=${chat.nome}&background=f8fafc&color=2EA7C9`;
          const naoLidas = chat.nao_lidas > 0 ? `<span class="badge bg-danger rounded-pill">${chat.nao_lidas}</span>` : '';
          const msgCurta = chat.ultima_mensagem ? (chat.ultima_mensagem.length > 30 ? chat.ultima_mensagem.substring(0,30) + '...' : chat.ultima_mensagem) : 'Áudio/Anexo';

          container.innerHTML += `
            <div class="d-flex align-items-center gap-2 mb-3">
              
              <div class="chat-card flex-grow-1 m-0 d-flex align-items-center gap-3" onclick="abrirConversa(${chat.contato_id}, '${chat.nome}')">
                <img src="${fotoSrc}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #2EA7C9;">
                <div>
                  <h6 class="fw-bold mb-1 text-dark d-flex align-items-center gap-2">${chat.nome} ${naoLidas}</h6>
                  <div class="text-muted" style="font-size: 13px;">${msgCurta}</div>
                </div>
              </div>
              
              <button class="star-btn ${chat.is_favorito ? 'active' : ''} shadow-sm" 
                      style="background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; flex-shrink: 0;" 
                      onclick="favoritar(${chat.contato_id}, ${!chat.is_favorito}, event)">
                  ★
              </button>
              
            </div>
          `;
      });
  }

  async function favoritar(contato_id, favoritarStatus) {
      try {
          await fetch("https://circulo-de-cuidado-api.onrender.com/favoritar", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ user_id: user.id, contato_id, favoritar: favoritarStatus })
          });
          carregarChats(); // Recarrega para atualizar a estrela na hora
      } catch(err) { 
          alert("Erro ao favoritar"); 
      }
  }

  function abrirConversa(contato_id, nome) {
    window.location.href = `conversa.html?id=${contato_id}&nome=${encodeURIComponent(nome)}`;
  }

  carregarChats();
</script>
</body>
</html>
