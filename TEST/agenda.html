<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Agenda</title>

<link href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css" rel="stylesheet">

<style>
  body { 
    background-color: #f4f6f9; 
  }

  .card-agenda {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }

  .data-item {
    background: #f8fafc;
    border-radius: 14px;
    padding: 15px;
  }

  .turno {
    font-size: 14px;
    color: #2EA7C9;
  }

  /* Cores para quando for AJUDAR */
  .item-ajudar {
    background: #f0f9ff;
    border: 2px solid #2EA7C9;
  }
  .item-ajudar .badge-tipo {
    background-color: #2EA7C9;
    color: white;
  }

  /* Cores para quando PRECISAR DE AJUDA */
  .item-preciso {
    background: #fff5f3;
    border: 2px solid #F26A4B;
  }
  .item-preciso .badge-tipo {
    background-color: #F26A4B;
    color: white;
  }

  /* Estilo da etiqueta (badge) */
  .badge-tipo {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 8px;
    font-weight: 800;
  }
</style>
</head>

<body>

<div class="container py-5">

    <div class="text-start mb-3">
        <a href="./index.html" class="btn btn-outline-secondary btn-sm fw-bold" style="border-radius: 10px;">
            ← Voltar ao Início
        </a>
    </div>

  <div class="card-agenda mx-auto col-md-6">

    <h3 class="fw-bold mb-4 text-center">
      Minha Agenda 💙
    </h3>

    <div id="listaDatas" class="d-grid gap-3"></div>

  </div>


</div>
  

<script>
  const user = JSON.parse(localStorage.getItem("usuario"));

  if (!user) {
    window.location.href = "login.html";
  }

  async function carregarDatas() {
    try {
      // Agora buscamos na rota combinada
      const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/agenda/${user.id}`);
      const datas = await res.json();

      // TRAVA DE SEGURANÇA
      if (!res.ok) {
        alert("Erro do servidor: " + (datas.erro || "Falha ao carregar agenda."));
        console.error(datas);
        return;
      }

      const container = document.getElementById("listaDatas");
      container.innerHTML = "";

      if (datas.length === 0) {
        container.innerHTML = "<p class='text-center text-muted'>Nenhum compromisso na agenda.</p>";
        return;
      }

      datas.forEach(item => {
        // Formata a data ignorando a diferença de fuso horário
        const partesData = item.data.split('T')[0].split('-');
        const dataFormatada = `${partesData[2]}/${partesData[1]}/${partesData[0]}`;
        
        // Verifica que tipo de evento é
        const isAjudar = item.tipo === 'ajudar';

        // Puxa a foto do banco ou gera um avatar com a inicial do nome
        const fotoSrc = item.outra_foto || `https://ui-avatars.com/api/?name=${item.outra_pessoa}&background=${isAjudar ? 'e0f2fe' : 'ffedeb'}&color=${isAjudar ? '2EA7C9' : 'F26A4B'}`;

        const div = document.createElement("div");
        div.className = `data-item d-flex align-items-center gap-3 w-100 ${isAjudar ? 'item-ajudar' : 'item-preciso'}`;

        div.innerHTML = `
          <div class="d-flex w-100 justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
              <img src="${fotoSrc}" style="width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid ${isAjudar ? '#2EA7C9' : '#F26A4B'}; background: white;">
              <div>
                <div class="d-flex align-items-center gap-2 mb-1">
                  <span class="fw-bold fs-5">${dataFormatada}</span>
                  <span class="badge-tipo">${isAjudar ? '💙 Vou Cuidar' : '🧡 Serei Cuidada'}</span>
                </div>
                <div class="turno text-dark">Turno: <strong>${item.periodo}</strong></div>
                <div class="text-muted mt-1" style="font-size: 13px;">Com: <strong>${item.outra_pessoa || "Aguardando..."}</strong></div>
              </div>
            </div>
            <button class="btn btn-sm btn-outline-danger" style="border-radius: 8px;" onclick="cancelarAgendamento(${item.id})">Cancelar</button>
          </div>
        `;

        container.appendChild(div);
      });
      
    } catch (erro) {
      alert("Erro ao carregar a agenda.");
      console.error(erro);
    }
  }

  // Função para cancelar o agendamento
  async function cancelarAgendamento(id) {
    if (!confirm("Tem certeza que deseja cancelar este agendamento?")) return;

    try {
      const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/agendamentos/${id}`, { method: "DELETE" });
      if (res.ok) {
        alert("Agendamento cancelado com sucesso!");
        carregarDatas(); // Recarrega a agenda
      } else {
        const erro = await res.json();
        alert(erro.erro || "Erro ao cancelar.");
      }
    } catch (err) {
      alert("Erro de conexão ao tentar cancelar.");
    }
  }

  carregarDatas();
</script>

</body>
</html>
