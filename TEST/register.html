<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Registo - Círculo de Cuidado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --coral: #F26A4B; --azul: #2EA7C9; }
        body { background: #f0fdf4; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; width: 400px; }
        .btn-primary { background: var(--coral); border: none; border-radius: 12px; padding: 10px; }
        .input-group-text { background: #f8fafc; cursor: pointer; border-left: none;}
        .input-emoji { background: transparent; border-right: none; }
        .form-control-emoji { border-left: none; padding-left: 0; background: #fff; }
        .form-control:focus { box-shadow: none; border-color: var(--coral); }
    </style>
</head>
<body>
    <div class="card shadow">
        <h3 class="text-center mb-4 fw-bold" style="color: var(--coral)">Criar Conta</h3>
        <form id="registerForm">
            <div class="input-group mb-3">
                <span class="input-group-text input-emoji">👤</span>
                <input type="text" id="nome" class="form-control form-control-emoji" placeholder="Nome Completo" required>
            </div>
            
            <div class="input-group mb-3">
                <span class="input-group-text input-emoji">📄</span>
                <input type="text" id="cpf" class="form-control form-control-emoji" placeholder="CPF" required maxlength="14" oninput="mascaraCPF(this)">
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text input-emoji">🎂</span>
                <input type="date" id="data_nascimento" class="form-control form-control-emoji" required title="Data de Nascimento">
            </div>
            
            <div class="input-group mb-3">
                <span class="input-group-text input-emoji">🔒</span>
                <input type="password" id="senha" class="form-control form-control-emoji" placeholder="Senha (min. 6 caracteres)" required minlength="6">
                <span class="input-group-text" id="toggleSenha">👁</span>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold">Cadastrar</button>
            <div class="text-center mt-3">
                <a href="login.html" style="color: var(--azul); text-decoration: none; font-weight: 700;">Já tem conta? Entrar</a>
            </div>
        </form>
    </div>
    <script>
        // Máscara de CPF
        function mascaraCPF(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        // Validador matemático de CPF
        function validarCPF(cpf) {
            cpf = cpf.replace(/[^\d]+/g,'');
            if(cpf == '') return false;
            if (cpf.length != 11 || /^(\d)\1{10}$/.test(cpf)) return false;
            let add = 0, rev = 0;
            for (let i=0; i < 9; i ++) add += parseInt(cpf.charAt(i)) * (10 - i);
            rev = 11 - (add % 11);
            if (rev == 10 || rev == 11) rev = 0;
            if (rev != parseInt(cpf.charAt(9))) return false;
            add = 0;
            for (let i = 0; i < 10; i ++) add += parseInt(cpf.charAt(i)) * (11 - i);
            rev = 11 - (add % 11);
            if (rev == 10 || rev == 11) rev = 0;
            if (rev != parseInt(cpf.charAt(10))) return false;
            return true;
        }

        document.getElementById("toggleSenha").onclick = function() {
            const s = document.getElementById("senha");
            s.type = s.type === "password" ? "text" : "password";
            this.textContent = s.type === "password" ? "👁" : "🙈";
        };

        document.getElementById("registerForm").onsubmit = async (e) => {
            e.preventDefault();
            
            const cpfDigitado = document.getElementById("cpf").value;
            const dataNascDigitada = document.getElementById("data_nascimento").value;

            // Validações locais
            if (!validarCPF(cpfDigitado)) return alert("CPF Inválido! Digite um CPF verdadeiro.");
            
            const hoje = new Date();
            const nasc = new Date(dataNascDigitada);
            if (nasc >= hoje) return alert("Data de nascimento inválida.");

            const res = await fetch("http://localhost:3000/register", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    nome: document.getElementById("nome").value, 
                    cpf: cpfDigitado.replace(/\D/g, ""), // Manda só os números pro banco
                    data_nascimento: dataNascDigitada, 
                    senha: document.getElementById("senha").value 
                })
            });

            if(res.ok) { 
                alert("Conta criada com sucesso!"); 
                window.location.href = "login.html"; 
            } else {
                const d = await res.json();
                alert(d.erro || "Erro ao cadastrar.");
            }
        };
    </script>
</body>
</html>
