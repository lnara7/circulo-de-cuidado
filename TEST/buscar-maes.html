<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscar Mães - Círculo de Cuidado</title>
<link href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css" rel="stylesheet">
<style>
  body { background-color: #f4f6f9; font-family: 'Nunito', sans-serif; }
  .search-bar { background: white; border-radius: 12px; padding: 10px 15px; border: 2px solid #e2e8f0; }
  .search-bar input { border: none; outline: none; background: transparent; width: 100%; margin-left: 10px; }
  .user-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
  .user-card:hover { transform: translateY(-2px); border-color: #2EA7C9; }
</style>
</head>
<body>

<div class="container py-4 col-md-6 mx-auto">
    <div class="mb-4 d-flex align-items-center gap-3">
        <a href="./index.html" class="btn btn-outline-secondary btn-sm fw-bold" style="border-radius: 10px;">← Início</a>
        <h4 class="fw-bold mb-0 text-dark">Buscar Mães 🔍</h4>
    </div>

    <div class="d-flex align-items-center search-bar mb-4 shadow-sm">
        <span>🔍</span>
        <input type="text" id="inputBusca" placeholder="Pesquisar mãe pelo nome..." onkeyup="buscarUsuarios()">
    </div>

    <div id="listaMaes" class="d-grid gap-3"></div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem("usuario"));
  if (!user) window.location.href = "login.html";

  async function buscarUsuarios() {
    const nome = document.getElementById("inputBusca").value;
    
    try {
      const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/buscar-maes/${user.id}?nome=${nome}`);
      const maes = await res.json();
      const container = document.getElementById("listaMaes");
      container.innerHTML = "";

      if (maes.length === 0) {
        container.innerHTML = "<p class='text-center text-muted mt-4'>Nenhuma mãe encontrada.</p>";
        return;
      }

      maes.forEach(mae => {
        const fotoSrc = mae.foto || `https://ui-avatars.com/api/?name=${mae.nome}&background=f8fafc&color=2EA7C9`;
        
        container.innerHTML += `
          <div class="user-card d-flex align-items-center gap-3" onclick="abrirConversa(${mae.id}, '${mae.nome}')">
            <img src="${fotoSrc}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #2EA7C9;">
            <div>
              <h6 class="fw-bold mb-0 text-dark">${mae.nome}</h6>
              <span class="text-muted" style="font-size: 13px;">Toque para enviar mensagem</span>
            </div>
          </div>
        `;
      });
    } catch (err) {
      console.error(err);
    }
  }

  function abrirConversa(contato_id, nome) {
    // Redireciona para a tela de conversa (que criaremos na Parte 2) passando o ID na URL
    window.location.href = `conversa.html?id=${contato_id}&nome=${encodeURIComponent(nome)}`;
  }

  // Carrega lista inicial aleatória
  buscarUsuarios();
</script>
</body>
</html>
