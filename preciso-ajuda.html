<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preciso de Ajuda</title>

<link href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css" rel="stylesheet">

<style>
  body { background-color: #f4f6f9; }

  .card-calendario {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    max-width: 700px;
    margin: auto;
  }

  footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
  }

  #historicoPedidos, #historicoDisponibilidade {
    margin-top: 15px;
    background: #eef2f7;
    padding: 15px;
    border-radius: 12px;
    max-height: 250px;
    overflow-y: auto;
  }

  #historicoPedidos p, #historicoDisponibilidade p {
    margin: 5px 0;
  }

  /* Calendário */
  table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
  td, th { border: 1px solid #ccc; width: 40px; height: 40px; text-align: center; vertical-align: middle; }
  .disponivel { background-color: #a0e7a0; cursor: pointer; } /* verde = voluntário disponível */
</style>
</head>

<body>

<div class="container py-5 mb-5">
  <div class="card-calendario text-center">

    <div class="text-start mb-3">
        <a href="./index.html" class="btn btn-outline-secondary btn-sm fw-bold" style="border-radius: 10px;">
            ← Voltar ao Início
        </a>
    </div>    

    <h3 class="fw-bold mb-4">Solicitar ajuda</h3>

    <input type="date" id="dataPedido" class="form-control mb-3">

    <select id="periodoPedido" class="form-select mb-3">
      <option value="">Escolha o turno</option>
      <option value="Manhã">🌅 Manhã</option>
      <option value="Tarde">🌇 Tarde</option>
    </select>

    <button class="btn btn-primary w-100 mb-3" onclick="solicitarAjuda()">
      Confirmar Pedido
    </button>
    
  </div>
</div>

<div class="card-calendario mx-auto col-md-6 mt-4">
  <h4 class="fw-bold mb-3 text-center" style="color: #2EA7C9;">Mães Disponíveis para Ajudar</h4>
  <div id="listaDisponiveis" class="d-grid gap-2"></div>
</div>


<script>
const inputDataPedido = document.getElementById("dataPedido");
const selectPeriodoPedido = document.getElementById("periodoPedido");

const hoje = new Date();
const ano = hoje.getFullYear();
const mes = String(hoje.getMonth() + 1).padStart(2,'0');
const dia = String(hoje.getDate()).padStart(2,'0');
const dataHoje = `${ano}-${mes}-${dia}`;
inputDataPedido.setAttribute("min", dataHoje);

// ====== Calendário ======
async function pintarCalendario() {
  const body = document.getElementById("calendar-body");
  const year = hoje.getFullYear();
  const month = hoje.getMonth();

  // Busca datas disponíveis de todos os usuários
  const res = await fetch("https://circulo-de-cuidado-api.onrender.com/disponibilidades-geral");
  const disponibilidades = await res.json(); // [{data:"2026-03-05", periodo:"Manhã"}]

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let html = "";
  let day = 1;
  for(let i=0;i<6;i++){
    html += "<tr>";
    for(let j=0;j<7;j++){
      if(i===0 && j<firstDay || day>daysInMonth){
        html += "<td></td>";
      } else {
        const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        let className = disponibilidades.some(d => d.data===dateStr) ? "disponivel" : "";
        html += `<td class="${className}">${day}</td>`;
        day++;
      }
    }
    html += "</tr>";
  }
  body.innerHTML = html;
}

pintarCalendario();

// ====== Funções de pedido e histórico ======
async function solicitarAjuda() {
  const valor = inputDataPedido.value;
  const periodo = selectPeriodoPedido.value;
  if (!valor) { alert("Escolha uma data."); return; }
  if (!periodo) { alert("Escolha o turno."); return; }

  const user = JSON.parse(localStorage.getItem("usuario"));
  if (!user) { alert("Usuário não encontrado."); return; }

  try {
    const res = await fetch("https://circulo-de-cuidado-api.onrender.com/pedidos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ solicitante_id: user.id, data: valor, periodo })
    });
    const resposta = await res.json();
    if (res.ok) {
      alert("Pedido enviado com sucesso 💙");
      inputDataPedido.value = "";
      selectPeriodoPedido.value = "";
      pintarCalendario(); // atualiza calendário
    } else {
      alert(resposta.erro || "Erro ao enviar pedido.");
    }
  } catch (err) {
    alert("Erro de conexão com o servidor.");
    console.error(err);
  }
}

async function verHistoricoPedidos() {
  const user = JSON.parse(localStorage.getItem("usuario"));
  if (!user) return;

  try {
    const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/historico-pedidos/${user.id}`);
    const dados = await res.json();

    const div = document.getElementById("historicoPedidos");
    div.innerHTML = "";
    if (dados.length === 0) { div.innerHTML = "<p>Nenhum pedido feito ainda.</p>"; return; }

    dados.forEach(d => {
      const p = document.createElement("p");
      p.textContent = `${d.data} - ${d.periodo}`;
      div.appendChild(p);
    });

  } catch (err) {
    console.error(err);
    alert("Erro ao buscar histórico de pedidos.");
  }
}

async function verHistoricoDisponibilidade() {
  const user = JSON.parse(localStorage.getItem("usuario"));
  if (!user) return;

  try {
    const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/historico-disponibilidade/${user.id}`);
    const dados = await res.json();

    const div = document.getElementById("historicoDisponibilidade");
    div.innerHTML = "";
    if (dados.length === 0) { div.innerHTML = "<p>Nenhuma data marcada para ajudar ainda.</p>"; return; }

    dados.forEach(d => {
      const p = document.createElement("p");
      p.textContent = `${d.data} - ${d.periodo}`;
      div.appendChild(p);
    });

  } catch (err) {
    console.error(err);
    alert("Erro ao buscar histórico de disponibilidades.");
  }
}

async function carregarMãesDisponiveis() {
    const user = JSON.parse(localStorage.getItem("usuario"));
    try {
      const res = await fetch(`https://circulo-de-cuidado-api.onrender.com/disponibilidades-abertas/${user.id}`);
      const disponibilidades = await res.json();
      const container = document.getElementById("listaDisponiveis");
      
      if (disponibilidades.length === 0) {
        container.innerHTML = "<p class='text-center text-muted'>Nenhuma mãe disponível no momento.</p>";
        return;
      }

      container.innerHTML = disponibilidades.map(d => {
        const dataF = d.data.split('T')[0].split('-').reverse().join('/');
        const fotoSrc = d.foto || `https://ui-avatars.com/api/?name=${d.nome}&background=f8fafc&color=2EA7C9`;

        return `
          <div class="d-flex justify-content-between align-items-center p-3 border rounded" style="background: #f0f9ff;">
            <div class="d-flex align-items-center gap-3">
              <img src="${fotoSrc}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover;">
              <div>
                <strong>${d.nome}</strong><br>
                <span style="font-size: 14px;">${dataF} - ${d.periodo}</span>
              </div>
            </div>
            <button class="btn btn-sm text-white fw-bold" style="background: #F26A4B;" 
              onclick="pedirAjudaMãe(${d.voluntaria_id}, '${d.data.split('T')[0]}', '${d.periodo}')">
              Pedir a ela
            </button>
          </div>
        `;
      }).join('');
    } catch (e) { console.error(e); }
  }

  window.pedirAjudaMãe = async function(destinatario_id, data, periodo) {
    const user = JSON.parse(localStorage.getItem("usuario"));
    try {
      const res = await fetch("https://circulo-de-cuidado-api.onrender.com/enviar-notificacao", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ remetente_id: user.id, destinatario_id, tipo: 'pede_ajuda', data, periodo })
      });
      const dados = await res.json();
      if(res.ok) alert("Pedido direcionado enviado! A mãe será notificada.");
      else alert(dados.erro);
    } catch (e) { alert("Erro de conexão."); }
  }

  // Chame a função ao carregar
  carregarMãesDisponiveis();
</script>

</body>
</html>
